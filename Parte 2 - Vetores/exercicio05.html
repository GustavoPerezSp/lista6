<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 05</title>
</head>

<body>

    <span id="favorito"></span> <input type="text" id="iFavorito">
    <button onclick="cadastrarFilme()">Cadastrar filme</button>
    <p id="pMsg"></p>


</body>

</html>

<script>
    let contadorFavorito = 1;
    favorito.innerHTML = `${contadorFavorito}º Filme favorito:`

    let filmesFavoritos = [];
    function cadastrarFilme() {
        let filme = iFavorito.value;

        if (filme != '') {
            filmesFavoritos.push(filme)
            contadorFavorito++
            favorito.innerHTML = `${contadorFavorito}º Filme favorito:`
            iFavorito.value = ''
        }

        if (filmesFavoritos.length >= 1) {
            pMsg.innerHTML = `Seu filme favorito: ${filmesFavoritos[0]}<br>`

            if (filmesFavoritos.length < 3) {
                pMsg.innerHTML += `Seu 3º filme favorito: Ainda não existe<br>`
            } else {
                pMsg.innerHTML += `Seu 3º filme favorito: ${filmesFavoritos[2]}<br>`
            }

            pMsg.innerHTML += `Total de filmes cadastrados: ${filmesFavoritos.length}`
        }
    }

</script>
