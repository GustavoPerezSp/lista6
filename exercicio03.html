<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 03</title>
</head>

<body>

    Digite uma frase: <input type="text" id="iFrase"> <br>
    Digite uma palavra: <input type="text" id="iPalavra"> <br>

    <button onclick="analisarFrase()">Analisar Frase</button>
    <p id="pAnalise"></p>


</body>

</html>

<script>

    function analisarFrase() {
        let frase = iFrase.value;
        let palavra = iPalavra.value;

        if (frase.startsWith(palavra) && frase.endsWith(palavra)) {
            pAnalise.innerHTML = `A frase começa e termina com ${palavra}!`
        } else if (frase.startsWith(palavra)) {
            pAnalise.innerHTML = `A frase começa com ${palavra}!`
        } else if (frase.endsWith(palavra)) {
            pAnalise.innerHTML = `A frase termina com ${palavra}!`
        } else {
            pAnalise.innerHTML = `A frase não começa e nem termina com ${palavra}!`
        }

    }
</script>
